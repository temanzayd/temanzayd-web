<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TemanZayd Community - Official Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; scroll-behavior: smooth; }
        .dark body { background-color: #0f172a; color: #f8fafc; }
        .mustard-brand { color: #d99a0d; }
        .bg-mustard { background-color: #f2b84b; color: #1a1a1a; }
        .glass-card { background: #ffffff; border: 1px solid #f0f0f0; box-shadow: 0 4px 20px rgba(0,0,0,0.03); transition: 0.3s; }
        .dark .glass-card { background: #1e293b; border: 1px solid #334155; }
        .nav-item { color: #888; transition: 0.3s; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: #d99a0d; border-bottom: 3px solid #f2b84b; }
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .input-style { width: 100%; padding: 1rem; background: rgba(0,0,0,0.03); border-radius: 1rem; outline: none; font-size: 14px; margin-bottom: 1rem; border: 1px solid transparent; }
        .dark .input-style { background: rgba(255,255,255,0.05); color: white; border: 1px solid #334155; }
        #qr-modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-[14px]">

    <div id="qr-modal" onclick="closeQR()">
        <div class="relative max-w-sm w-full bg-white p-4 rounded-[2rem]" onclick="event.stopPropagation()">
            <img src="qr.jpg" alt="QR" class="w-full h-auto rounded-2xl">
            <button onclick="closeQR()" class="absolute -top-4 -right-4 w-10 h-10 bg-mustard text-white rounded-full font-black">✕</button>
        </div>
    </div>

    <button onclick="toggleDarkMode()" class="fixed bottom-6 right-6 z-[100] w-12 h-12 bg-mustard rounded-full shadow-lg flex items-center justify-center text-xl">
        <span id="dark-icon">🌙</span>
    </button>

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-4 py-4 flex justify-around border-b border-gray-100 dark:border-slate-800 overflow-x-auto whitespace-nowrap">
        <button onclick="showPage('home')" id="nav-home" class="nav-item py-2 px-2 active">Beranda</button>
        <button onclick="showPage('about')" id="nav-about" class="nav-item py-2 px-2">Mitra</button>
        <button onclick="showPage('program')" id="nav-program" class="nav-item py-2 px-2">Program</button>
        <button onclick="showPage('ajukan')" id="nav-ajukan" class="nav-item py-2 px-2">Ajukan</button>
        <button onclick="showPage('media')" id="nav-media" class="nav-item py-2 px-2">Media</button>
        <button onclick="showPage('team')" id="nav-team" class="nav-item py-2 px-2">Kami</button>
        <button onclick="showPage('donation')" id="nav-donation" class="nav-item py-2 px-2">Donasi</button>
        <button onclick="showPage('contact')" id="nav-contact" class="nav-item py-2 px-2">Hubungi</button>
    </nav>

    <main class="flex-grow p-5 space-y-6">
        
        <section id="home" class="page active space-y-5 text-center">
            <div class="py-4">
                <img src="logo.png" alt="Logo" class="w-24 mx-auto mb-4">
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">TEMAN<span class="mustard-brand">ZAYD</span></h1>
                <p class="text-[10px] tracking-[0.3em] uppercase opacity-40 mt-1 font-bold italic">Berbagi Bersama Untuk Sesama</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-card p-5 rounded-3xl border-b-4 border-f2b84b">
                    <div class="text-3xl font-black mustard-brand">> 5.000+</div>
                    <div class="text-[10px] uppercase tracking-widest opacity-60 font-black">Penerima Manfaat</div>
                </div>
                <div class="glass-card p-5 rounded-3xl border-b-4 border-f2b84b">
                    <div class="text-3xl font-black mustard-brand">30+</div>
                    <div class="text-[10px] uppercase tracking-widest opacity-60 font-black">Relawan Aktif</div>
                </div>
            </div>
        </section>

        <section id="ajukan" class="page space-y-6">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-center">Ajukan <span class="mustard-brand">Bantuan</span></h2>
            <div class="glass-card p-6 rounded-[2.5rem]">
                <form id="formAjukan" class="space-y-1">
                    <input type="hidden" name="Tipe_Form" value="Pengajuan Bantuan">
                    <input type="text" name="Nama_Pasien" placeholder="Nama Pasien" required class="input-style">
                    <input type="text" name="Umur" placeholder="Umur" required class="input-style">
                    <textarea name="Alamat" placeholder="Alamat Domisili" required class="input-style h-24"></textarea>
                    <input type="text" name="Diagnosa" placeholder="Diagnosa Penyakit" required class="input-style">
                    <input type="text" name="Merk_Susu" placeholder="Merk Susu" required class="input-style">
                    <input type="text" name="Nama_Pendamping" placeholder="Nama Pendamping" required class="input-style">
                    <input type="number" name="WA_Pendamping" placeholder="WA Pendamping" required class="input-style">
                    <input type="url" name="Link_Lampiran" placeholder="Link GDrive" required class="input-style">
                    <button type="submit" class="w-full py-5 bg-mustard font-black uppercase tracking-widest rounded-3xl text-[12px]">Kirim Pengajuan</button>
                </form>
            </div>
        </section>

        <section id="donation" class="page space-y-6 pt-4 text-center">
            <div class="glass-card p-8 rounded-[3rem] border-t-4 border-f2b84b">
                <div onclick="openQR()" class="bg-gray-50 dark:bg-slate-800 p-4 rounded-3xl inline-block mb-6 w-3/5 aspect-square flex flex-col items-center justify-center mx-auto cursor-pointer">
                    <img src="qr.jpg" alt="QR" class="w-full h-full object-contain">
                </div>
                <button onclick="copyRekening()" class="relative">
                    <p id="rekening" class="text-4xl font-mono font-black tracking-tighter">7326328938</p>
                    <div id="copy-toast" class="absolute -top-10 left-1/2 -translate-x-1/2 bg-black text-white text-[10px] py-1 px-3 rounded-full opacity-0">Tersalin!</div>
                </button>
                <p class="text-sm font-black mustard-brand uppercase tracking-widest">a.n TEMANZAYD</p>
            </div>
            <form id="formDonasi" class="glass-card p-6 rounded-[2.5rem] space-y-1">
                <input type="hidden" name="Tipe_Form" value="Konfirmasi Donasi">
                <input type="text" name="Nama_Donatur" id="donatur_nama" placeholder="Nama Donatur" required class="input-style">
                <input type="number" name="Nominal" id="donatur_nominal" placeholder="Nominal Rp" required class="input-style">
                <select id="program_tujuan_select" name="Program" required class="input-style font-bold opacity-60"></select>
                <button type="submit" class="w-full py-5 bg-mustard font-black uppercase tracking-widest rounded-3xl text-[12px]">Konfirmasi WhatsApp</button>
            </form>
        </section>

        <section id="contact" class="page space-y-6 pt-4 text-center">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-2 text-center">Hubungi <span class="mustard-brand">Kami</span></h2>
            <div class="glass-card p-6 rounded-[2.5rem] text-left">
                <form id="formHubungi" class="space-y-1">
                    <input type="hidden" name="Tipe_Form" value="Pertanyaan Umum">
                    <input type="text" name="Nama" placeholder="Nama Anda" required class="input-style">
                    <input type="text" name="Kontak" placeholder="WA / Email" required class="input-style">
                    <textarea name="Pesan" placeholder="Pertanyaan atau Pesan" required class="input-style h-32"></textarea>
                    <button type="submit" class="w-full py-5 bg-mustard font-black uppercase tracking-widest rounded-3xl text-[12px]">Kirim Pesan</button>
                </form>
            </div>
        </section>

        <section id="about" class="page"><div id="mitra-grid" class="grid grid-cols-2 gap-3"></div></section>
        <section id="program" class="page"><div id="program-grid" class="grid grid-cols-2 gap-3"></div></section>
        <section id="media" class="page space-y-6">
            <iframe src="https://www.instagram.com/p/DPfpEheD5yN/embed" class="w-full h-[500px] rounded-[2.5rem] overflow-hidden" frameborder="0"></iframe>
        </section>
        <section id="team" class="page space-y-8">
            <div class="photo-frame"><img src="face1.jpg" class="w-full h-auto"></div>
        </section>

    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXopbbzX7ndIVu4bIeyZJW6HHODjxjb6Y_3pic1TjWkaYOe6CDk7x9anhIAjPpAiT1UQ/exec';

        async function handleForm(event, callback) {
            event.preventDefault();
            const form = event.target;
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "MENGIRIM..."; btn.disabled = true;

            try {
                const formData = new FormData(form);
                const params = new URLSearchParams();
                formData.forEach((value, key) => params.append(key, value));

                // Kirim ke Google Sheets
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                if (callback) callback(formData);
                form.reset();
                if (!callback) alert("Data berhasil terkirim!");
            } catch (error) {
                alert("Gagal mengirim. Coba lagi.");
            } finally {
                btn.innerText = originalText; btn.disabled = false;
            }
        }

        // Fix: Mengambil value program yang benar
        document.getElementById('formDonasi').addEventListener('submit', (e) => handleForm(e, (data) => {
            const nama = data.get('Nama_Donatur');
            const nominal = data.get('Nominal');
            const program = data.get('Program'); // Mengambil value dari select yang bernama 'Program'
            
            const text = `Halo Admin Salma, saya ingin konfirmasi donasi.%0ANama: ${nama}%0ANominal: Rp${nominal}%0AProgram: ${program}`;
            window.location.href = `https://wa.me/6282261814595?text=${text}`;
        }));

        document.getElementById('formAjukan').addEventListener('submit', (e) => handleForm(e));
        document.getElementById('formHubungi').addEventListener('submit', (e) => handleForm(e));

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.getElementById('nav-' + pId).classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function openQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
        function copyRekening() { navigator.clipboard.writeText('7326328938'); const t = document.getElementById('copy-toast'); t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); document.getElementById('dark-icon').innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙'; }

        const mitras = ["Adara Relief International", "KNRP", "Warung Makan Relawan", "Yayasan Cahaya Madani", "Elitery", "Life For Ummah"];
        const progs = [{n: "#KalengSusuKebaikan", i: "🍼"}, {n: "#TemanZaydBersamaPalestina", i: "🇵🇸"}, {n: "#BulirBerasKebaikan", i: "🌾"}, {n: "#KotakMakanKebaikan", i: "🍱"}, {n: "#BantuBarengPejuangSehat", i: "🏥"}, {n: "#SedekahUmum", i: "✨"}];

        mitras.forEach(m => { document.getElementById('mitra-grid').innerHTML += `<div class="glass-card p-4 rounded-2xl flex items-center justify-center h-20 text-center"><span class="text-[10px] font-extrabold uppercase leading-tight">${m}</span></div>`; });
        
        const pSelect = document.getElementById('program_tujuan_select');
        progs.forEach(p => {
            document.getElementById('program-grid').innerHTML += `<div class="glass-card p-4 rounded-2xl flex flex-col justify-between h-24 border-l-4 border-f2b84b"><div class="text-2xl">${p.i}</div><span class="text-[10px] font-black uppercase italic">${p.n}</span></div>`;
            
            const opt = document.createElement('option');
            opt.value = p.n; // Memberikan value agar data tidak kosong
            opt.text = `${p.i} ${p.n}`;
            pSelect.appendChild(opt);
        });
    </script>
</body>
</html>
